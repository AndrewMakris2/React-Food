<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Dumbbell -->
  <!-- Left outer plate -->
  <rect x="1.5" y="9.5" width="5" height="13" rx="2" fill="white"/>
  <!-- Left inner plate -->
  <rect x="6.5" y="12" width="3" height="8" rx="1.2" fill="white" opacity="0.8"/>
  <!-- Bar -->
  <rect x="9.5" y="14.5" width="13" height="3" rx="1.5" fill="white"/>
  <!-- Right inner plate -->
  <rect x="22.5" y="12" width="3" height="8" rx="1.2" fill="white" opacity="0.8"/>
  <!-- Right outer plate -->
  <rect x="25.5" y="9.5" width="5" height="13" rx="2" fill="white"/>

  <!-- Lightning bolt centered on bar -->
  <polygon points="17.5,7 13.5,17 16.5,17 14.5,25 20,14.5 16.5,14.5" fill="url(#bolt)"/>
</svg>
