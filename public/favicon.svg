<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Dumbbell -->
  <!-- Left plate top -->
  <rect x="3" y="10" width="4" height="12" rx="1.5" fill="white"/>
  <!-- Left plate bottom -->
  <rect x="4.5" y="8" width="2" height="16" rx="1" fill="white" opacity="0.85"/>
  <!-- Bar -->
  <rect x="7" y="14.5" width="18" height="3" rx="1.5" fill="white"/>
  <!-- Right plate top -->
  <rect x="25" y="10" width="4" height="12" rx="1.5" fill="white"/>
  <!-- Right plate bottom -->
  <rect x="25.5" y="8" width="2" height="16" rx="1" fill="white" opacity="0.85"/>
  <!-- Lightning bolt overlay -->
  <polygon points="18,8 14,17 17,17 14,24 20,14 17,14" fill="#fbbf24" opacity="0.95"/>
</svg>
