[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Route all /api/* calls to Netlify Functions
[[redirects]]
  from   = "/api/generate"
  to     = "/.netlify/functions/generate"
  status = 200

# SPA fallback — always serve index.html for client-side routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
